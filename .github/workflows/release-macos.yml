name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate source
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            studio/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix studio ci

      - name: Run project validation
        run: |
          npm run check
          npm test
          npm run studio:build

  unsigned-installer:
    name: Build unsigned test installer
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            studio/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix studio ci

      - name: Build ad-hoc arm64 installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run desktop:installer:mac

      - name: Generate checksums
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(dist-desktop/*.dmg dist-desktop/*.zip)
          if [[ ${#artifacts[@]} -ne 2 ]]; then
            echo "::error::Expected exactly one DMG and one ZIP artifact."
            exit 1
          fi
          (
            cd dist-desktop
            shasum -a 256 -- ./*.dmg ./*.zip > SHA256SUMS.txt
          )

      - name: Upload unsigned test installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dreamskin-macos-arm64-unsigned-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.zip
            dist-desktop/SHA256SUMS.txt
            dist-desktop/packaged-smoke.png
            dist-desktop/installed-smoke.png

  signed-release:
    name: Build signed and notarized release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: macos-15
    timeout-minutes: 90
    environment: macos-release
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            studio/package-lock.json

      - name: Confirm tag and release secrets
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          version="$(node -p "require('./package.json').version")"
          expected_tag="v${version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${expected_tag}."
            exit 1
          fi
          if [[ "${version}" == *-* ]]; then
            echo "::error::The macOS release workflow only publishes stable versions with latest-mac.yml."
            exit 1
          fi

          missing=0
          for secret_name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Required macOS release secret ${secret_name} is not configured."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix studio ci

      - name: Build and strictly verify signed release
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run desktop:release:mac

      - name: Generate checksums
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(dist-desktop/*.dmg dist-desktop/*.zip)
          if [[ ${#artifacts[@]} -ne 2 ]]; then
            echo "::error::Expected exactly one DMG and one ZIP artifact."
            exit 1
          fi
          (
            cd dist-desktop
            shasum -a 256 -- ./*.dmg ./*.zip > SHA256SUMS.txt
          )

      - name: Verify release update assets
        shell: bash
        run: |
          shopt -s nullglob
          dmgs=(dist-desktop/*.dmg)
          zips=(dist-desktop/*.zip)
          dmg_blockmaps=(dist-desktop/*.dmg.blockmap)
          zip_blockmaps=(dist-desktop/*.zip.blockmap)
          required_singletons=(
            "${#dmgs[@]}:DMG"
            "${#zips[@]}:ZIP"
            "${#dmg_blockmaps[@]}:DMG blockmap"
            "${#zip_blockmaps[@]}:ZIP blockmap"
          )
          for entry in "${required_singletons[@]}"; do
            count="${entry%%:*}"
            label="${entry#*:}"
            if [[ "${count}" -ne 1 ]]; then
              echo "::error::Expected exactly one ${label} release asset, found ${count}."
              exit 1
            fi
          done
          for required in \
            dist-desktop/latest-mac.yml \
            dist-desktop/SHA256SUMS.txt \
            dist-desktop/packaged-smoke.png \
            dist-desktop/installed-smoke.png; do
            if [[ ! -s "${required}" ]]; then
              echo "::error::Required release asset ${required} is missing or empty."
              exit 1
            fi
          done
          if ! grep -Eq "^version: ['\"]?$(node -p "require('./package.json').version")['\"]?$" dist-desktop/latest-mac.yml; then
            echo "::error::latest-mac.yml does not describe the package version."
            exit 1
          fi

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dreamskin-macos-arm64-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 30
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.zip
            dist-desktop/*.blockmap
            dist-desktop/latest-mac.yml
            dist-desktop/SHA256SUMS.txt
            dist-desktop/packaged-smoke.png
            dist-desktop/installed-smoke.png

      - name: Prepare stable GitHub Release metadata
        id: release
        shell: bash
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "${notes_file}" ]]; then
            echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"
          else
            echo "notes_file=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if existing_release="$(gh release view "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json isDraft,isPrerelease 2>release-view-error.log)"; then
            if [[ "$(jq -r '.isDraft' <<<"${existing_release}")" != "true" ]]; then
              echo "::error::Release ${GITHUB_REF_NAME} is already published; refusing to replace it."
              exit 1
            fi
            echo "Replacing the incomplete draft release from an earlier run."
            gh release delete "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --yes
          else
            view_status=$?
            if ! grep -qiE 'release not found|HTTP 404' release-view-error.log; then
              cat release-view-error.log >&2
              exit "${view_status}"
            fi
          fi

          args=(
            release create "${GITHUB_REF_NAME}"
            --repo "${GITHUB_REPOSITORY}"
            --verify-tag
            --draft
            --title "DreamSkin Studio ${GITHUB_REF_NAME}"
          )
          if [[ -n "${{ steps.release.outputs.notes_file }}" ]]; then
            args+=(--notes-file "${{ steps.release.outputs.notes_file }}")
          else
            args+=(--generate-notes)
          fi
          gh "${args[@]}"

      - name: Upload assets to draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s nullglob
          assets=(
            dist-desktop/*.dmg
            dist-desktop/*.zip
            dist-desktop/*.dmg.blockmap
            dist-desktop/*.zip.blockmap
            dist-desktop/latest-mac.yml
            dist-desktop/SHA256SUMS.txt
            dist-desktop/packaged-smoke.png
            dist-desktop/installed-smoke.png
          )
          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --repo "${GITHUB_REPOSITORY}"

      - name: Validate draft release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s nullglob
          local_assets=(
            dist-desktop/*.dmg
            dist-desktop/*.zip
            dist-desktop/*.dmg.blockmap
            dist-desktop/*.zip.blockmap
            dist-desktop/latest-mac.yml
            dist-desktop/SHA256SUMS.txt
            dist-desktop/packaged-smoke.png
            dist-desktop/installed-smoke.png
          )
          expected="$(printf '%s\n' "${local_assets[@]##*/}" | LC_ALL=C sort)"
          release_json="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets,isDraft,isPrerelease)"
          actual="$(jq -r '.assets[].name' <<<"${release_json}" | LC_ALL=C sort)"
          if [[ "${expected}" != "${actual}" ]]; then
            echo "::error::Draft release assets do not match the verified local assets."
            diff -u <(printf '%s\n' "${expected}") <(printf '%s\n' "${actual}") || true
            exit 1
          fi
          if [[ "$(jq -r '.isDraft' <<<"${release_json}")" != "true" ]]; then
            echo "::error::Release was published before asset validation."
            exit 1
          fi
          if [[ "$(jq -r '.isPrerelease' <<<"${release_json}")" != "false" ]]; then
            echo "::error::The stable draft release was unexpectedly marked as a prerelease."
            exit 1
          fi
          if ! jq -e '.assets | length == 8 and all(.size > 0)' <<<"${release_json}" >/dev/null; then
            echo "::error::Draft release contains a missing or empty asset."
            exit 1
          fi

      - name: Publish verified GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --prerelease=false
          published="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json isDraft,isPrerelease)"
          if [[ "$(jq -r '.isDraft' <<<"${published}")" != "false" ]] \
            || [[ "$(jq -r '.isPrerelease' <<<"${published}")" != "false" ]]; then
            echo "::error::GitHub Release publication state is incorrect."
            exit 1
          fi
